name: ethereal_genui
description: >-
  A native, offline-capable, stateful generative-UI engine for Flutter. Render
  model-authored JSON `ui` blocks as real, interactive widgets — with a pluggable
  registry, a single-source-of-truth schema, durable per-widget state, and an
  RFC-6902 delta loop.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.12.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Used only by the `chart` block renderer.
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
